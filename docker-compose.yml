services:

  # ---------------------------------------------------------------
  # Nginx — reverse proxy + static file server (public entry point)
  # Replaces the old "client" service.
  # Builds the React app internally (multi-stage) and serves it,
  # while proxying /api/* and /ws to the Express server.
  # ---------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        # Vite bakes VITE_* vars at build time.
        # Empty string = relative URLs; Nginx proxies /api/* to Express.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: vectorhub-nginx
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped
    networks:
      - vectorhub-network

  # ---------------------------------------------------------------
  # Express — API server (internal only, not exposed to the internet)
  # ---------------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: vectorhub-server
    # No public ports — Nginx reaches Express via internal Docker DNS
    expose:
      - "3000"
    env_file:
      - ./.env.docker
    volumes:
      - uploads_data:/app/data/runtime/uploads
    depends_on:
      redis:
        condition: service_healthy
      ai:
        # Wait until FastAPI is accepting requests before starting Express
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vectorhub-network

  # ---------------------------------------------------------------
  # FastAPI — AI service (internal only)
  # ---------------------------------------------------------------
  ai:
    build:
      context: .
      dockerfile: ai/Dockerfile
    container_name: vectorhub-ai
    # No public ports — Express reaches FastAPI via internal Docker DNS
    expose:
      - "8000"
    env_file:
      - ./.env.docker
    volumes:
      - uploads_data:/app/data/runtime/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vectorhub-network

  # ---------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: vectorhub-postgres

    restart: unless-stopped

    env_file:
      - ./.env.docker

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    expose:
      - "5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - vectorhub-network

  # ---------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vectorhub-redis

    restart: unless-stopped

    env_file:
      - ./.env.docker

    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}

    expose:
      - "6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - vectorhub-network

  # ---------------------------------------------------------------
  # Qdrant — vector database (internal only)
  # ---------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vectorhub-qdrant

    restart: unless-stopped

    expose:
      - "6333"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - vectorhub-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:

networks:
  vectorhub-network:
    driver: bridge
