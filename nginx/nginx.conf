# HTTP — redirect everything to HTTPS
server {
    listen 80;
    server_name vectorhub-ronit.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy + static file server
server {
    listen 443 ssl;
    server_name vectorhub-ronit.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/vectorhub-ronit.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vectorhub-ronit.duckdns.org/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket — voice transcription (wss upgrade)
    location /ws {
        proxy_pass http://vectorhub-server:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Express API
    location /api/ {
        proxy_pass http://vectorhub-server:3000;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large file uploads (matches Express 100mb limit)
        client_max_body_size 100m;
    }

    # React SPA — catch-all for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
