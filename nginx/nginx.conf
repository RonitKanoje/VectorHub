server {
    listen 80;
    server_name vectorhub-ronit.duckdns.org;

    # React Static Files
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket — voice transcription (wss upgrade)
    location /ws {
        proxy_pass http://vectorhub-server:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Express API
    location /api/ {
        proxy_pass http://vectorhub-server:3000;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large file uploads (matches Express 100mb limit)
        client_max_body_size 100m;
    }

    # React SPA — catch-all for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
